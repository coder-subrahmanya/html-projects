<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Log In</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="login.css">
    </head>

    <body>

        <a href="index.html" class="back-home">← Back to Home</a>

        <div class="auth-container">

            <div class="auth-card">

                <h1>Welcome back.</h1>

                <p class="sub-text">
                Ready to tweak your resume for that next application?
                </p>

                <form>

                    <label>Email Address</label>
                    <input type="email" placeholder="e.g., alex@example.com">

                    <label>Password</label>
                    <input type="password" placeholder="Minimum 8 characters">

                    <a href="reset.html" class="forgot">Forgot password?</a>

                    <button type="submit">Log In</button>

                </form>

                <p class="bottom-text">
                Don't have an account yet? <a href="signup.html">Sign up here</a>
                </p>

            </div>

        </div>

    </body>
</html>
