<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Log In</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="login.css">
    </head>

    <body>

        <a href="index.html" class="back-home">← Back to Home</a>

        <div class="auth-container">

            <div class="auth-card">

               <h1>Forgot your password?</h1>

                <p class="sub-text">
                Don't sweat it, it happens to the best of us. Enter your email below and we'll send you a reset link.
                </p>

                <form>

                <label>Email Address</label>
                <input type="email" placeholder="e.g., alex@example.com">

                <button type="submit">Send Reset Link</button>

                </form>

                <p class="bottom-text">
                 Remembered it? <a href="login.html">Back to Log In</a>
                </p>

            </div>

        </div>

    </body>
</html>
